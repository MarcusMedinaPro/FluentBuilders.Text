name: Release - Full Pipeline

on:
  push:
    tags: ["v*"]
    branches: [release, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  security-events: write
  packages: write
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: 1 Build & Test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore csharp

      - name: Build
        run: dotnet build csharp --configuration Release --no-restore

      - name: Test
        run: dotnet test csharp --configuration Release --no-build --verbosity normal --logger trx

      - name: Pack
        run: dotnet pack csharp/src/MarcusMedina.Fluent.Text.Core/MarcusMedina.Fluent.Text.Core.csproj --configuration Release --no-build --output ./nupkgs

      - name: Upload unsigned packages
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-packages
          path: ./nupkgs/*.nupkg

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'


  package-signing:
    needs: build-and-test
    runs-on: [self-hosted, Signer]
    name: 3 Package Signing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download unsigned packages
        uses: actions/download-artifact@v4
        with:
          name: unsigned-packages
          path: ./unsigned

      - name: Sign packages
        shell: cmd
        run: |
          echo Signing packages...
          set SIGNTOOL=C:\Program Files (x86)\Microsoft SDKs\ClickOnce\SignTool\signtool.exe
          for %%f in (./unsigned/*.nupkg) do (
            echo Signing: %%f
            "%SIGNTOOL%" sign /n "Open Source Developer, Marcus Ackre Medina" /fd sha256 /tr http://time.certum.pl /td sha256 "%%f"
            if errorlevel 1 (
              echo ERROR: Signing failed for %%f
              exit /b 1
            )
            echo Signed OK: %%f
          )

      - name: Verify signatures
        run: |
          for package in ./unsigned/*.nupkg; do
            dotnet nuget verify "$package"
          done

      - name: Generate SHA256 checksums
        run: |
          cd unsigned
          sha256sum *.nupkg > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload signed packages
        uses: actions/upload-artifact@v4
        with:
          name: signed-packages
          path: |
            ./unsigned/*.nupkg
            ./unsigned/SHA256SUMS.txt

  publish-nuget:
    needs: package-signing
    runs-on: ubuntu-latest
    name: 4 Publish to NuGet.org
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download signed packages
        uses: actions/download-artifact@v4
        with:
          name: signed-packages
          path: ./packages

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push ./packages/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./packages/*.nupkg
            ./packages/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: false
